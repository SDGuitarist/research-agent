name: MCP Parity Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  mcp-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          # 3.12: intentional — lint check only, not a compatibility test.
          # Bump when a broader CI test workflow is added.
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -e .
      - run: python scripts/lint_mcp_parity.py
